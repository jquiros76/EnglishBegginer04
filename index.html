<!DOCTYPE html>

<title>Ruta360 – Unidad 5 & Final: A1 Bridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap');
:root{--brand:#F59E0B;--dark:#D97706;--light:#F59E0B22;--mid:#F59E0B44;--bg:#0F1117;--s1:#1A1D27;--s2:#22263A;--s3:#2C3050;--txt:#E8EAF6;--muted:#8892B0;--dim:#4A5578;--ok:#22C55E;--err:#EF4444;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:256px;background:var(--s1);border-right:1px solid var(--s3);display:flex;flex-direction:column;z-index:100;overflow:hidden;}
.sh{padding:18px 16px 14px;background:linear-gradient(135deg,var(--dark),var(--brand));flex-shrink:0;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px;}
.plbl{font-size:11px;color:rgba(255,255,255,.75);margin-top:3px;line-height:1.3;}
.prog{margin-top:9px;background:rgba(255,255,255,.2);border-radius:99px;height:4px;overflow:hidden;}
.pf{height:100%;background:#fff;border-radius:99px;transition:width .4s;}
.pl{font-size:11px;color:rgba(255,255,255,.8);margin-top:4px;}
.ll{flex:1;overflow-y:auto;padding:6px 0;}
.ll::-webkit-scrollbar{width:4px;}.ll::-webkit-scrollbar-thumb{background:var(--s3);border-radius:99px;}
.li{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-left:3px solid transparent;transition:background .15s;}
.li:hover{background:var(--s2)}.li.active{background:var(--light);border-left-color:var(--brand);}
.ln{width:26px;height:26px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;}
.li.active .ln{background:var(--brand);color:#fff;}.li.done .ln{background:var(--ok);color:#fff;}
.li.ckpt .ln{background:linear-gradient(135deg,#F59E0B,#F97316);color:#fff;}
.lt{font-size:12px;color:var(--muted);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li.active .lt{color:var(--txt);}
.nav-links{padding:10px 14px;border-top:1px solid var(--s3);display:flex;gap:6px;flex-wrap:wrap;}
.nav-a{font-size:11px;color:var(--muted);text-decoration:none;padding:4px 8px;border-radius:5px;border:1px solid var(--s3);transition:all .15s;}
.nav-a:hover{border-color:var(--brand);color:var(--brand);}
.main{margin-left:256px;flex:1;}
.topbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--s2);padding:11px 26px;display:flex;align-items:center;gap:10px;}
.btn{padding:6px 14px;border-radius:7px;border:1px solid var(--s3);background:var(--s1);color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn:hover:not(:disabled){border-color:var(--brand);color:var(--brand);}.btn:disabled{opacity:.3;cursor:not-allowed;}
.tts{padding:6px 11px;border-radius:7px;background:var(--s1);border:1px solid var(--s3);color:var(--muted);font-size:17px;cursor:pointer;transition:all .15s;line-height:1;}
.tts:hover{border-color:var(--brand);color:var(--brand);}
.badge{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--brand);background:var(--light);padding:4px 11px;border-radius:99px;}
.content{padding:26px 30px 56px;max-width:840px;}
.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand);background:var(--light);padding:3px 10px;border-radius:99px;margin-bottom:9px;}
h1.t{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--txt);line-height:1.2;letter-spacing:-.4px;}
.obj{margin-top:7px;font-size:14px;color:var(--muted);line-height:1.5;}.lh{margin-bottom:22px;}
.sec{background:var(--s1);border-radius:13px;border:1px solid var(--s2);margin-bottom:16px;overflow:hidden;}
.sh2{padding:13px 18px 11px;border-bottom:1px solid var(--s2);display:flex;align-items:center;gap:9px;cursor:pointer;}
.sico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--light);}
.slbl{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--txt);}
.stog{margin-left:auto;color:var(--dim);font-size:11px;}
.sbody{padding:16px 18px;}.sbody.col{display:none;}
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px;}
.vc{background:var(--s2);border-radius:7px;padding:9px 12px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.vc:hover{border-color:var(--brand);background:var(--light);}
.ven{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--txt);}
.ves{font-size:11px;color:var(--muted);}.vsic{font-size:9px;color:var(--brand);margin-top:2px;}
.grule{background:linear-gradient(135deg,var(--light),var(--mid));border-left:3px solid var(--brand);border-radius:7px;padding:13px 15px;margin-bottom:13px;}
.grl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--brand);margin-bottom:3px;}
.grt{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--txt);}
.el{list-style:none;display:flex;flex-direction:column;gap:6px;}
.ei{display:flex;align-items:center;gap:9px;background:var(--s2);border-radius:7px;padding:8px 13px;font-size:13px;color:var(--txt);}
.edot{color:var(--brand);font-size:14px;}.esp{margin-left:auto;background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:2px;}
.esp:hover{color:var(--brand);}
.ex{background:var(--s2);border-radius:13px;padding:16px;margin-bottom:12px;border:1px solid var(--s3);}
.ex.ok{border-color:var(--ok);background:#052012;}.ex.no{border-color:var(--err);background:#1a0505;}
.exn{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;}
.exq{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:12px;line-height:1.4;}
.opts{display:flex;flex-direction:column;gap:7px;}
.ob{padding:9px 14px;background:var(--s3);border:1px solid transparent;border-radius:7px;color:var(--txt);font-size:13px;text-align:left;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.ob:hover:not(:disabled){border-color:var(--brand);background:var(--light);}.ob.ca{background:#052012;border-color:var(--ok);color:var(--ok);}.ob.wa{background:#1a0505;border-color:var(--err);color:var(--err);}
.fw{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
.fi{padding:8px 13px;background:var(--s3);border:1px solid var(--dim);border-radius:7px;color:var(--txt);font-size:13px;outline:none;min-width:170px;font-family:'DM Sans',sans-serif;transition:border-color .15s;}
.fi:focus{border-color:var(--brand);}.fi.ok{border-color:var(--ok);background:#052012;color:var(--ok);}.fi.no{border-color:var(--err);background:#1a0505;}
.fh{font-size:11px;color:var(--dim);font-style:italic;margin-top:5px;}
.cb{padding:8px 18px;border-radius:7px;background:var(--brand);border:none;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.cb:hover{filter:brightness(1.15);}
.fb{margin-top:9px;font-size:12px;font-weight:500;display:none;}.fb.show{display:block;}.fb.ok{color:var(--ok);}.fb.no{color:var(--err);}
.spg{display:flex;flex-direction:column;gap:7px;}
.spr{display:flex;align-items:center;gap:11px;background:var(--s2);border-radius:7px;padding:11px 14px;}
.spt{flex:1;font-size:14px;color:var(--txt);line-height:1.4;}
.spb{background:var(--light);border:1px solid var(--brand);border-radius:7px;padding:7px 13px;color:var(--brand);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Space Grotesk',sans-serif;transition:all .15s;}
.spb:hover,.spb.pl{background:var(--brand);color:#fff;}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}.spb.pl{animation:pulse 1s infinite;}
.tip{background:linear-gradient(135deg,#1a1100,#251a00);border:1px solid #F59E0B44;border-left:3px solid #F59E0B;border-radius:13px;padding:13px 16px;display:flex;gap:11px;align-items:flex-start;}
.tipico{font-size:17px;flex-shrink:0;}.tiptxt{font-size:13px;color:#FCD34D;line-height:1.5;}
.sbar{background:var(--s1);border:1px solid var(--s2);border-radius:13px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.slb{font-size:12px;color:var(--muted);}.sv{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--brand);}
.st{flex:1;height:5px;background:var(--s2);border-radius:99px;overflow:hidden;}.sf{height:100%;background:var(--brand);border-radius:99px;transition:width .5s;}
.rst{background:none;border:1px solid var(--s3);border-radius:6px;padding:4px 11px;color:var(--muted);font-size:11px;cursor:pointer;}
.rst:hover{border-color:var(--err);color:var(--err);}
@media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;}.content{padding:16px 14px 40px;}.vg{grid-template-columns:1fr 1fr;}}
</style>

<script>
const LS=[{"n":41,"phase":1,"title":"Food & Meals – More Vocabulary","obj":"Expand food vocabulary and describe meals.","vocab":[["Breakfast","Desayuno"],["Lunch","Almuerzo"],["Dinner","Cena"],["Snack","Merienda"],["Fruit","Fruta"],["Vegetable","Verdura"],["Meat","Carne"],["Soup","Sopa"],["Dessert","Postre"],["Delicious","Delicioso"]],"grammar":{"rule":"Present simple with meal time expressions","examples":["I eat breakfast at 7am.","We have lunch at noon.","My family eats dinner together.","This soup is delicious!"]},"exercises":[{"type":"quiz","q":"'Delicious' means:","opts":["picante","saludable","riquísimo","grande"],"ans":2},{"type":"fill","q":"I eat ___ at 7am. (the first meal of the day)","blank":"breakfast","hint":"The morning meal"},{"type":"quiz","q":"Which is a vegetable?","opts":["chicken","banana","carrot","rice"],"ans":2},{"type":"fill","q":"For ___, I eat rice, beans, and chicken.","blank":"lunch","hint":"The midday meal"}],"tip":"In the US and UK, meals are: BREAKFAST (morning), LUNCH (midday), DINNER (evening). In Latin America, ALMUERZO is the biggest meal!","speak":["I eat breakfast at seven.","For lunch, I have rice and beans.","Dinner is my favorite meal.","This food is delicious!"]},{"n":42,"phase":1,"title":"Sports & Hobbies","obj":"Name 10 sports and talk about hobbies.","vocab":[["Football / Soccer","Fútbol"],["Basketball","Baloncesto"],["Tennis","Tenis"],["Swimming","Natación"],["Running","Correr"],["Cycling","Ciclismo"],["Chess","Ajedrez"],["Music","Música"],["Video games","Videojuegos"],["Win","Ganar"]],"grammar":{"rule":"Play + sport (no article). Do + activity. Go + -ing.","examples":["I play soccer every weekend.","She does yoga in the morning.","We go swimming on Fridays.","He plays chess with his grandfather."]},"exercises":[{"type":"quiz","q":"Which is CORRECT?","opts":["I play the soccer.","I play a soccer.","I play soccer.","I play to soccer."],"ans":2},{"type":"fill","q":"We go ___ every weekend. (swimming)","blank":"swimming","hint":"Go + verb-ing"},{"type":"quiz","q":"Chess is a type of:","opts":["sport","food","clothing","transport"],"ans":0},{"type":"fill","q":"She ___ tennis three times a week. (play)","blank":"plays","hint":"He/she/it = add -s"}],"tip":"PLAY (with a ball/team): play soccer, play chess. DO (individual sports/activities): do yoga. GO (action word + -ing): go swimming.","speak":["I play soccer every weekend.","She goes swimming on Sundays.","Do you play any sports?","My favorite sport is basketball!"]},{"n":43,"phase":1,"title":"Ordinal Numbers & Dates","obj":"Use ordinal numbers 1st–31st to say dates.","vocab":[["First (1st)","Primero"],["Second (2nd)","Segundo"],["Third (3rd)","Tercero"],["Fourth (4th)","Cuarto"],["Fifth (5th)","Quinto"],["Twentieth (20th)","Vigésimo"],["Thirtieth (30th)","Trigésimo"],["Date","Fecha"],["Calendar","Calendario"],["Today is…","Hoy es…"]],"grammar":{"rule":"'Today is the ___ of ___.' for dates","examples":["Today is the first of January.","My birthday is the fifteenth of March.","The exam is on the twenty-second of June."]},"exercises":[{"type":"quiz","q":"What is the ordinal number for 3?","opts":["three","thrice","third","threeth"],"ans":2},{"type":"fill","q":"Today is the ___ of June. (if today is June 1st)","blank":"first","hint":"Ordinal number for 1"},{"type":"quiz","q":"'The fifth of May' in numbers is:","opts":["May 15","May 5","May 50","May 4"],"ans":1},{"type":"fill","q":"My birthday is the ___ of December. (use your own birthday day)","blank":"(your day)","hint":"What ordinal number is your birthday?"}],"tip":"1st, 2nd, 3rd are irregular. From 4th onwards, just add -TH! Except: fifth, eighth, ninth, twelfth (irregular!).","speak":["Today is the first of January.","My birthday is the twentieth of April.","The exam is on the third of March.","What is today's date?"]},{"n":44,"phase":1,"title":"In the City – Places","obj":"Name 12 places in a city and explain what they are.","vocab":[["School","Escuela"],["Hospital","Hospital"],["Supermarket","Supermercado"],["Park","Parque"],["Library","Biblioteca"],["Restaurant","Restaurante"],["Bank","Banco"],["Cinema","Cine"],["Church","Iglesia"],["Police station","Delegación de policía"]],"grammar":{"rule":"'You can ___ at the ___.'","examples":["You can eat at a restaurant.","You can study at the library.","You can get money at the bank.","You can see a doctor at the hospital."]},"exercises":[{"type":"quiz","q":"Where can you borrow books?","opts":["bank","cinema","library","restaurant"],"ans":2},{"type":"fill","q":"You can see a movie at the ___.","blank":"cinema","hint":"Place to watch films"},{"type":"quiz","q":"Where do you go when you are sick?","opts":["library","hospital","bank","park"],"ans":1},{"type":"fill","q":"You can buy food at the ___.","blank":"supermarket","hint":"Big store with food"}],"tip":"'You CAN ___' is a great way to describe what you do at a place. Practice describing your neighborhood!","speak":["The library is next to the school.","You can eat at the restaurant.","Is there a bank near here?","I go to the supermarket on Saturdays."]},{"n":45,"phase":1,"title":"Health – Feeling Sick","obj":"Describe health problems and give basic health advice.","vocab":[["Headache","Dolor de cabeza"],["Stomachache","Dolor de estómago"],["Fever","Fiebre"],["Cold","Resfriado"],["Cough","Tos"],["Sore throat","Dolor de garganta"],["Tired","Cansado"],["Medicine","Medicina"],["Doctor","Doctor/Médico"],["What's wrong?","¿Qué te pasa?"]],"grammar":{"rule":"'I have a ___.' / 'You should ___.'","examples":["I have a headache.","I have a cold.","You should rest.","You should drink water.","You should see a doctor."]},"exercises":[{"type":"quiz","q":"'I have a fever' means:","opts":["Tengo frío","Tengo fiebre","Tengo tos","Tengo dolor de garganta"],"ans":1},{"type":"fill","q":"I have a ___. My head hurts.","blank":"headache","hint":"Pain in the head"},{"type":"quiz","q":"'You should rest' is advice for someone who is:","opts":["hungry","tired and sick","late for school","happy"],"ans":1},{"type":"fill","q":"You should ___ a doctor if you have a fever.","blank":"see","hint":"Visit a professional"}],"tip":"'I have a + illness' for most sicknesses. 'You should + base verb' for giving health advice.","speak":["I have a headache.","What's wrong?","I have a cold and a fever.","You should drink water and rest."]},{"n":46,"phase":1,"title":"School Life","obj":"Describe school subjects and express opinions.","vocab":[["Math","Matemáticas"],["Science","Ciencias"],["English","Inglés"],["History","Historia"],["Art","Arte"],["PE","Educación Física"],["Music","Música"],["Geography","Geografía"],["Subject","Materia"],["Interesting","Interesante"]],"grammar":{"rule":"'My favourite subject is ___.' / 'I think ___ is ___.'","examples":["My favourite subject is English.","I think math is difficult but interesting.","Science is my least favourite subject.","I love art because it is creative."]},"exercises":[{"type":"quiz","q":"PE stands for:","opts":["Personal Experience","Physical Education","Public Entrance","Primary Education"],"ans":1},{"type":"fill","q":"My favourite ___ is English.","blank":"subject","hint":"School class/course"},{"type":"quiz","q":"'Geography' is the study of:","opts":["numbers","history","the Earth and places","living things"],"ans":2},{"type":"fill","q":"I think math is ___. (you find it hard)","blank":"difficult","hint":"The opposite of easy"}],"tip":"In British English: 'favourite'. In American English: 'favorite'. Both are correct!","speak":["My favourite subject is English.","I think science is very interesting.","Math is difficult but important.","I love art class!"]},{"n":47,"phase":1,"title":"Past Tense – Was & Were","obj":"Use 'was' and 'were' to talk about the past.","vocab":[["Was","Era/Estuvo/Fue (singular)"],["Were","Eran/Estuvieron/Fueron (plural)"],["Yesterday","Ayer"],["Last week","La semana pasada"],["Ago","Hace (tiempo)"],["Before","Antes"],["Then","Entonces"],["Past","Pasado"],["Young","Joven"],["Old","Viejo"]],"grammar":{"rule":"WAS (I/he/she/it). WERE (you/we/they). Negative: wasn't/weren't.","examples":["I was tired yesterday.","She was at school.","We were happy.","They weren't at home.","Was he at the party? Yes, he was!"]},"exercises":[{"type":"quiz","q":"'They ___ happy at the party.' (past)","opts":["is","are","was","were"],"ans":3},{"type":"fill","q":"I ___ very tired yesterday.","blank":"was","hint":"I = was (singular past)"},{"type":"quiz","q":"'She wasn't at school' means:","opts":["Ella estuvo en la escuela","Ella no estuvo en la escuela","¿Estuvo ella en la escuela?","Ella va a la escuela"],"ans":1},{"type":"fill","q":"___ you at the party? Yes, I was!","blank":"Were","hint":"Question form with 'you'"}],"tip":"WAS = I, he, she, it. WERE = you, we, they. This is ALL you need for past tense of 'be'!","speak":["I was tired yesterday.","We were at school.","She wasn't at home.","Were you happy? Yes, I was!"]},{"n":48,"phase":1,"title":"Regular Past Tense Verbs","obj":"Form and use regular past tense verbs.","vocab":[["Walked","Caminó/Caminé"],["Talked","Habló/Hablé"],["Played","Jugó/Jugué"],["Cooked","Cocinó/Cocinó"],["Watched","Vio/Vi"],["Listened","Escuchó/Escuché"],["Visited","Visitó/Visité"],["Studied","Estudió/Estudié"],["Started","Empezó/Empecé"],["Finished","Terminó/Terminé"]],"grammar":{"rule":"Verb + -ED for regular past. Negative: didn't + base verb.","examples":["I walked to school yesterday.","She cooked dinner last night.","We didn't watch TV.","Did you study? Yes, I studied!"]},"exercises":[{"type":"quiz","q":"The past tense of 'play' is:","opts":["playes","played","plaid","playd"],"ans":1},{"type":"fill","q":"She ___ dinner last night. (cook)","blank":"cooked","hint":"Regular past = add -ED"},{"type":"quiz","q":"'I didn't study' — the base verb after 'didn't' is:","opts":["studied","studying","study","studies"],"ans":2},{"type":"fill","q":"Did you walk to school? Yes, I ___.","blank":"walked","hint":"Short answer using the past verb"}],"tip":"Regular past = just add -ED! But watch the spelling: study → studied (change y to i+ed). Stop → stopped (double the consonant).","speak":["I walked to school yesterday.","She cooked a delicious dinner.","We watched a movie last night.","Did you study? Yes, I studied for two hours!"]},{"n":49,"phase":1,"title":"Irregular Past Tense Verbs","obj":"Use 15 common irregular past tense verbs.","vocab":[["Went (go)","Fue/Fui"],["Saw (see)","Vio/Vi"],["Ate (eat)","Comió/Comí"],["Had (have)","Tuvo/Tuve"],["Came (come)","Vino/Vine"],["Got (get)","Obtuvo/Obtuve"],["Gave (give)","Dio/Di"],["Took (take)","Tomó/Tomé"],["Made (make)","Hizo/Hice"],["Bought (buy)","Compró/Compré"]],"grammar":{"rule":"Irregular verbs must be memorized! Negative: didn't + BASE verb.","examples":["I went to the beach yesterday.","She saw a great movie.","We ate pizza for dinner.","I didn't go to school today.","Did you see that?"]},"exercises":[{"type":"quiz","q":"The past of 'go' is:","opts":["goed","went","gone","gos"],"ans":1},{"type":"fill","q":"I ___ to the market yesterday. (go)","blank":"went","hint":"Irregular past of 'go'"},{"type":"quiz","q":"'She didn't eat breakfast' — the verb after 'didn't' is:","opts":["ate","eat","eating","eats"],"ans":1},{"type":"fill","q":"We ___ a great movie last night. (see)","blank":"saw","hint":"Irregular past of 'see'"}],"tip":"IMPORTANT: After 'didn't' and 'did you', ALWAYS use the BASE VERB (infinitive): I didn't GO. Did she EAT? NOT 'I didn't went'!","speak":["I went to the park yesterday.","We ate rice and beans for dinner.","She saw a beautiful sunset.","I didn't buy anything at the market."]},{"n":50,"phase":1,"title":"CHECKPOINT 5 – Story Time","obj":"Apply past tense skills in extended tasks.","vocab":[["Story","Historia/Cuento"],["Yesterday","Ayer"],["Last week","La semana pasada"],["Then","Luego"],["After that","Después"],["Finally","Finalmente"],["Because","Porque"],["Suddenly","De repente"],["However","Sin embargo"],["The end","Fin"]],"grammar":{"rule":"Past simple: was/were, regular -ed, irregular verbs in a narrative","examples":["Yesterday, I woke up early. I ate breakfast and went to school.","Suddenly, it started to rain. I didn't have an umbrella!","Finally, I arrived home. I was very tired but happy."]},"exercises":[{"type":"quiz","q":"'Yesterday, I went to the park' — 'went' is the past of:","opts":["get","give","go","get up"],"ans":2},{"type":"fill","q":"I ___ very tired after the long walk. (be - past)","blank":"was","hint":"Past tense of 'be' with 'I'"},{"type":"quiz","q":"Which sentence is in the PAST?","opts":["I go to school.","I will go to school.","I went to school.","I am going to school."],"ans":2},{"type":"fill","q":"She didn't ___ to the party. (go)","blank":"go","hint":"After 'didn't' use the base verb"}],"tip":"Great job! You can now tell stories in English! Keep practicing by writing about your day every evening.","speak":["Yesterday, I woke up early.","I ate breakfast and went to school.","After school, I played soccer with my friends.","Finally, I came home and watched TV."]},{"n":51,"phase":1,"title":"Future Plans – Going To","obj":"Express future intentions using 'going to'.","vocab":[["Going to","Va a / Voy a"],["Plan","Plan"],["Next week","La próxima semana"],["Tomorrow","Mañana"],["Soon","Pronto"],["Future","Futuro"],["Want to","Querer"],["Hope to","Esperar"],["Next year","El próximo año"],["Intend to","Tener la intención de"]],"grammar":{"rule":"Subject + am/is/are + going to + base verb","examples":["I am going to study tonight.","She is going to travel next month.","We are going to have a party!","Are you going to come? Yes, I am!"]},"exercises":[{"type":"quiz","q":"'She is going to travel' — when does this happen?","opts":["In the past","Right now","In the future","It's a habit"],"ans":2},{"type":"fill","q":"I am going to ___ English every day. (study)","blank":"study","hint":"Base verb after 'going to'"},{"type":"quiz","q":"Which is CORRECT?","opts":["She going to travel.","She is go to travel.","She is going to travel.","She is going travel."],"ans":2},{"type":"fill","q":"Are you going to come to the party? Yes, I ___!","blank":"am","hint":"Short affirmative answer"}],"tip":"'Going to' = you have a plan or intention for the future. 'I AM going to' / 'She IS going to' / 'They ARE going to'.","speak":["I am going to study English every day.","She is going to visit her grandmother.","We are going to have a great time!","Are you going to come? Yes, I am!"]},{"n":52,"phase":1,"title":"BEGINNER FOUNDATIONS FINAL","obj":"Full review of all 52 Beginner lessons before A1 formal start.","vocab":[["Congratulations","Felicitaciones"],["Achievement","Logro"],["Foundation","Base/Fundamento"],["Ready","Listo"],["Next level","Siguiente nivel"],["Review","Repasar"],["Celebrate","Celebrar"],["Progress","Progreso"],["Placement","Colocación"],["Confident","Seguro/Confiado"]],"grammar":{"rule":"All beginner structures: present simple, past simple, future going to, modals can/must, adjectives, prepositions","examples":["I can speak English! I couldn't before.","Yesterday I went to school. Today I am studying. Tomorrow I am going to practice.","Turn left at the corner. The school is next to the park."]},"exercises":[{"type":"quiz","q":"'I am going to study' is a plan for:","opts":["the past","right now","the future","a habit"],"ans":2},{"type":"fill","q":"She ___ to the party yesterday. (go - irregular past)","blank":"went","hint":"Irregular past of 'go'"},{"type":"quiz","q":"'There are three students' — 'are' is used because:","opts":["the verb is different","three is more than one (plural)","it is present continuous","there is a question"],"ans":1},{"type":"fill","q":"I ___ swim but I ___ fly a plane.","blank":"can / can't","hint":"Ability vs inability"}],"tip":"YOU HAVE COMPLETED THE BEGINNER FOUNDATIONS! 52 lessons, 52 hours, 800+ words. You are ready for A1! ¡Increíble trabajo!","speak":["I can speak English now!","Yesterday I went to school. Today I am studying English.","I am going to practice every day.","Congratulations to me! I completed Phase 1!"]}];
const KD='r360_p11D_done',KS='r360_p11D_sc';
let ci=0;
const done=new Set(JSON.parse(localStorage.getItem(KD)||'[]'));
const sc=JSON.parse(localStorage.getItem(KS)||'{}');
function save(){localStorage.setItem(KD,JSON.stringify([...done]));localStorage.setItem(KS,JSON.stringify(sc));}
function isCk(t){return /CHECKPOINT|FINAL|EVALUATION|GRADUATION|PLACEMENT/.test(t);}
function bSB(){
  const ll=document.getElementById('ll');ll.innerHTML='';
  LS.forEach((l,i)=>{
    const d=document.createElement('div');
    d.className='li'+(i===ci?' active':'')+(done.has(i)?' done':'')+(isCk(l.title)?' ckpt':'');
    d.onclick=()=>go(i);
    d.innerHTML=`<div class="ln">${done.has(i)?'✓':l.n}</div><div class="lt">${l.title}</div>`;
    ll.appendChild(d);
  });
  const pct=Math.round(done.size/LS.length*100);
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pl').textContent=done.size+' / '+LS.length+' completadas';
  ll.querySelector('.active')?.scrollIntoView({block:'nearest'});
}
function nav(d){const n=ci+d;if(n>=0&&n<LS.length)go(n);}
function go(i){ci=i;render();bSB();window.scrollTo(0,0);}
function sp(txt){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=0.88;u.pitch=1.05;window.speechSynthesis.speak(u);return u;
}
function tog(id){const b=document.getElementById('sb_'+id),t=document.getElementById('st_'+id);b.classList.toggle('col');t.textContent=b.classList.contains('col')?'▼':'▲';}
function qAns(eid,ch,ans){
  document.querySelectorAll('[id^="'+eid+'_o"]').forEach((b,i)=>{b.disabled=true;if(i===ans)b.classList.add('ca');if(i===ch&&i!==ans)b.classList.add('wa');});
  const fb=document.getElementById(eid+'_fb'),wrap=document.getElementById(eid+'_w');
  const ei=parseInt(eid.split('_')[2]);
  if(!sc[ci])sc[ci]={c:0,t:LS[ci].exercises.length,a:0};
  if(sc[ci].a<=ei){
    sc[ci].a=ei+1;
    if(ch===ans){sc[ci].c++;fb.textContent='✓ ¡Correcto!';fb.className='fb show ok';wrap.classList.add('ok');}
    else{fb.textContent='✗ Respuesta: '+LS[ci].exercises[ei].opts[ans];fb.className='fb show no';wrap.classList.add('no');}
    uSB();save();
  }
}
function chkF(eid,ans){
  const inp=document.getElementById(eid+'_i'),fb=document.getElementById(eid+'_fb'),wrap=document.getElementById(eid+'_w');
  const v=inp.value.trim().toLowerCase(),a=String(ans).toLowerCase();
  if(!v)return;
  const ei=parseInt(eid.split('_')[2]);
  if(!sc[ci])sc[ci]={c:0,t:LS[ci].exercises.length,a:0};
  if(sc[ci].a<=ei){
    sc[ci].a=ei+1;inp.disabled=true;
    const flex=['(any letter)','(your age)',"(today's day)",'(your day)','(your name)'];
    const ok=flex.some(f=>a.includes(f))||v===a||v.includes(a)||a.includes(v);
    if(ok){inp.classList.add('ok');fb.textContent='✓ ¡Correcto! ¡Bien hecho!';fb.className='fb show ok';wrap.classList.add('ok');sc[ci].c++;}
    else{inp.classList.add('no');fb.textContent='✗ Respuesta: '+ans;fb.className='fb show no';wrap.classList.add('no');}
    uSB();save();
  }
}
function uSB(){
  const s=sc[ci]||{c:0,t:LS[ci].exercises.length};
  const pct=Math.round(s.c/s.t*100);
  const sv=document.querySelector('.sv'),sf=document.querySelector('.sf');
  if(sv)sv.textContent=s.c+'/'+s.t;if(sf)sf.style.width=pct+'%';
}
function rst(){delete sc[ci];done.delete(ci);save();render();bSB();}
function markDone(){done.add(ci);save();bSB();if(ci<LS.length-1)setTimeout(()=>nav(1),300);else document.getElementById('db').textContent='🎉 ¡Unidad Completada!';}
function spP(btn,txt){btn.classList.add('pl');const u=sp(txt);if(u)u.onend=()=>btn.classList.remove('pl');setTimeout(()=>btn.classList.remove('pl'),5000);}
function render(){
  const l=LS[ci];
  document.getElementById('bg').textContent='Lección '+l.n;
  document.getElementById('pb').disabled=ci===0;
  document.getElementById('nb').disabled=ci===LS.length-1;
  const s=sc[ci]||{c:0,t:l.exercises.length};
  const pct=Math.round(s.c/s.t*100);
  let h=`<div class="lh"><div class="tag">Fase 1 · Lección ${l.n}</div><h1 class="t">${l.title}</h1><p class="obj">🎯 ${l.obj}</p></div>`;
  h+=`<div class="sbar"><div><div class="slb">Ejercicios</div><div class="sv">${s.c}/${s.t}</div></div><div class="st"><div class="sf" style="width:${pct}%"></div></div><button class="rst" onclick="rst()">↺ Reiniciar</button></div>`;
  // Vocabulary
  h+=`<div class="sec"><div class="sh2" onclick="tog('v')"><div class="sico">📚</div><span class="slbl">Vocabulario (${l.vocab.length} palabras)</span><span class="stog" id="st_v">▲</span></div><div class="sbody" id="sb_v"><div class="vg">`;
  l.vocab.forEach(([en,es])=>h+=`<div class="vc" onclick="sp('${en.replace(/'/g,"\\'")}')"><div class="ven">${en}</div><div class="ves">${es}</div><div class="vsic">🔊 toca para escuchar</div></div>`);
  h+=`</div></div></div>`;
  // Grammar
  h+=`<div class="sec"><div class="sh2" onclick="tog('g')"><div class="sico">📐</div><span class="slbl">Gramática</span><span class="stog" id="st_g">▲</span></div><div class="sbody" id="sb_g"><div class="grule"><div class="grl">Regla</div><div class="grt">${l.grammar.rule}</div></div><ul class="el">`;
  l.grammar.examples.forEach(ex=>h+=`<li class="ei"><span class="edot">▸</span><span>${ex}</span><button class="esp" onclick="sp('${ex.replace(/'/g,"\\'")}')">🔊</button></li>`);
  h+=`</ul></div></div>`;
  // Exercises
  h+=`<div class="sec"><div class="sh2" onclick="tog('e')"><div class="sico">✏️</div><span class="slbl">Ejercicios</span><span class="stog" id="st_e">▲</span></div><div class="sbody" id="sb_e">`;
  l.exercises.forEach((ex,ei)=>{
    const eid=`ex_${ci}_${ei}`;
    if(ex.type==='quiz'){
      h+=`<div class="ex" id="${eid}_w"><div class="exn">Pregunta ${ei+1}</div><div class="exq">${ex.q}</div><div class="opts">`;
      ex.opts.forEach((o,oi)=>h+=`<button class="ob" id="${eid}_o${oi}" onclick="qAns('${eid}',${oi},${ex.ans})">${o}</button>`);
      h+=`</div><div class="fb" id="${eid}_fb"></div></div>`;
    }else{
      h+=`<div class="ex" id="${eid}_w"><div class="exn">Pregunta ${ei+1}</div><div class="exq">${ex.q}</div><div class="fw"><input class="fi" id="${eid}_i" placeholder="Escribe tu respuesta…" onkeydown="if(event.key==='Enter')chkF('${eid}',${JSON.stringify(ex.blank)})"><button class="cb" onclick="chkF('${eid}',${JSON.stringify(ex.blank)})">Verificar</button></div><div class="fh">💡 ${ex.hint}</div><div class="fb" id="${eid}_fb"></div></div>`;
    }
  });
  h+=`</div></div>`;
  // Speaking
  h+=`<div class="sec"><div class="sh2" onclick="tog('s')"><div class="sico">🎤</div><span class="slbl">Práctica Oral</span><span class="stog" id="st_s">▲</span></div><div class="sbody" id="sb_s"><div class="spg">`;
  l.speak.forEach(s2=>h+=`<div class="spr"><span class="spt">${s2}</span><button class="spb" onclick="spP(this,'${s2.replace(/'/g,"\\'")}')">🔊 Escucha y Repite</button></div>`);
  h+=`</div></div></div>`;
  // Tip
  h+=`<div class="tip"><div class="tipico">💡</div><div class="tiptxt">${l.tip}</div></div>`;
  // Complete
  h+=`<div style="margin-top:22px;text-align:center;"><button id="db" onclick="markDone()" style="padding:13px 32px;background:var(--brand);border:none;border-radius:9px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;">${done.has(ci)?'✓ Completada — Siguiente →':'✅ Marcar como Completada'}</button></div>`;
  document.getElementById('mc').innerHTML=h;
}
bSB();render();
</script>
</body>
</html>
